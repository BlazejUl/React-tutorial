<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ProductDetails({name, price, discountPrice, imageSrc}){
          return(
            <div>
              {imageSrc && <img src={imageSrc} width="50"/>}
              <div>
                {name}  
              </div>
              {!discountPrice ? (
                <div>
                  Price: {price}  
                </div>
              ):(
                <div>
                  <del>
                    Price: {price}
                  </del> 
                  <div>
                    Discount price: {discountPrice}
                  </div>
                </div>
              )}
              <div>
                <button>Add to Cart</button>  
              </div>
            </div>
          )
        }

        function App(){
          return(
            <>
              <ProductDetails name="Cotton socks" price="$10.90" discountPrice="$5.45" imageSrc="cotton-socks.png"/>
              <ProductDetails name="Tennis balls" price="$6.00" imageSrc="tennis-balls.png"/>
              <ProductDetails name="Plain T-Shirt" price="$7.99" imageSrc="plain-t-shirt.png"/>
            </>
          )
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
